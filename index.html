<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brometal</title>

<style>
body{margin:0;font-family:Arial;background:#0d0d0d;color:#fff}
header{padding:20px;text-align:center;background:#111;color:#00c3ff}
.hero{text-align:center;padding:60px;background:#1a1a1a}
.section{padding:30px;text-align:center}
.card{background:#1c1c1c;margin:10px;padding:12px;border-radius:8px}
nav a{margin:10px;color:#00c3ff;text-decoration:none}
footer{text-align:center;padding:20px;background:#111;color:#777}
</style>
</head>

<body>

<header id="title"></header>

<nav>
<a href="index.html">الرئيسية</a>
<a href="about.html">من نحن</a>
<a href="gallery.html">المعرض</a>
</nav>

<div class="hero">
<h1 id="hero_title"></h1>
<p id="hero_sub"></p>
</div>

<div class="section">
<h2>خدماتنا</h2>
<div id="services"></div>
</div>

<div class="section">
<h2>الأسعار</h2>
<div id="prices"></div>
</div>

<div class="section">
<h2>تواصل</h2>
<a id="whatsapp">واتساب</a>
<a id="telegram">تيليغرام</a>
<a id="facebook">فيسبوك</a>
</div>

<footer id="footer"></footer>

<script>
fetch("data.json")
.then(r=>r.json())
.then(d=>{

title.innerText=d.title;
hero_title.innerText=d.hero_title;
hero_sub.innerText=d.hero_sub;

let s=document.getElementById("services");
d.services.forEach(x=>{
let div=document.createElement("div");
div.className="card";
div.innerText=x;
s.appendChild(div);
});

let p=document.getElementById("prices");
d.prices.forEach(x=>{
let div=document.createElement("div");
div.className="card";
div.innerText=x.name+" - "+x.price;
p.appendChild(div);
});

whatsapp.href=d.links.whatsapp;
telegram.href=d.links.telegram;
facebook.href=d.links.facebook;

footer.innerText=d.footer;

});
</script>

</body>
</html>

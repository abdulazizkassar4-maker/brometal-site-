<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brometal</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0d0d0d;
color:#fff;
}

header{
background:#111;
padding:20px;
text-align:center;
font-size:26px;
color:#00c3ff;
font-weight:bold;
}

.hero{
padding:60px 20px;
text-align:center;
background:linear-gradient(135deg,#111,#1a1a1a);
}

.hero h1{
font-size:32px;
color:#00c3ff;
}

.section{
padding:40px 20px;
text-align:center;
}

.card{
background:#1c1c1c;
padding:15px;
margin:10px;
border-radius:10px;
border:1px solid #333;
}

.links a{
display:block;
margin:10px auto;
padding:12px;
width:80%;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.whatsapp{background:#25D366;color:#000;}
.telegram{background:#0088cc;color:#fff;}
.facebook{background:#1877f2;color:#fff;}

footer{
padding:20px;
text-align:center;
color:#777;
background:#111;
}
</style>
</head>

<body>

<header>BROMETAL</header>

<div class="hero">
<h1>تصنيع معدني - لوحات - طباعة</h1>
<p>حلول احترافية لعرض أعمالك التجارية</p>
</div>

<div class="section">
<h2>خدماتنا</h2>

<div class="card">تصنيع معدني احترافي</div>
<div class="card">لوحات إعلانية</div>
<div class="card">طباعة وتجهيز</div>

</div>

<div class="section">
<h2>تواصل معنا</h2>

<div class="links">
<a class="whatsapp" href="https://wa.me/000000000">واتساب</a>
<a class="telegram" href="https://t.me/your_channel">تيليغرام</a>
<a class="facebook" href="https://facebook.com/your_page">فيسبوك</a>
</div>

</div>

<footer id="footer">
© Brometal 2026
</footer>

<script>
fetch("data.json")
.then(res => res.json())
.then(d => {

document.getElementById("title").innerText = d.title;
document.getElementById("hero_title").innerText = d.hero_title;
document.getElementById("hero_sub").innerText = d.hero_sub;

// الخدمات
let servicesDiv = document.getElementById("services");
servicesDiv.innerHTML = "";
d.services.forEach(s => {
  let div = document.createElement("div");
  div.className = "card";
  div.innerText = s;
  servicesDiv.appendChild(div);
});

// الروابط
document.getElementById("whatsapp").href = d.links.whatsapp;
document.getElementById("telegram").href = d.links.telegram;
document.getElementById("facebook").href = d.links.facebook;

// الفوتر
document.getElementById("footer").innerText = d.footer;

});
</script>

</body>
  </html>

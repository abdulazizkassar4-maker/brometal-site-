<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brometal</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0d0d0d;
color:#fff;
}

header{
padding:20px;
text-align:center;
background:#111;
color:#00c3ff;
font-size:26px;
font-weight:bold;
}

.hero{
text-align:center;
padding:60px;
background:#1a1a1a;
}

.section{
padding:30px;
text-align:center;
}

.card{
background:#1c1c1c;
margin:10px;
padding:12px;
border-radius:8px;
}

a{
color:#00c3ff;
text-decoration:none;
display:block;
margin:5px;
}

/* --- Gallery Grid --- */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.grid img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.grid img:hover{
transform:scale(1.05);
}

/* --- Lightbox --- */
#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

#lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}
</style>
</head>

<body>

<header id="title">Brometal</header>

<div class="hero">
<h1 id="hero_title"></h1>
<p id="hero_sub"></p>
</div>

<div class="section">
<h2>خدماتنا</h2>
<div id="services"></div>
</div>

<div class="section">
<h2>الأسعار</h2>
<div id="prices"></div>
</div>

<div class="section">
<h2>المعرض</h2>
<div id="gallery" class="grid"></div>
</div>

<div class="section">
<h2>تواصل معنا</h2>
<a id="whatsapp">واتساب</a>
<a id="telegram">تيليغرام</a>
<a id="facebook">فيسبوك</a>
</div>

<div class="section">
<p id="footer"></p>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="this.style.display='none'">
<img id="lightboxImg">
</div>

<script>
fetch("data.json")
.then(r => r.json())
.then(d => {

// العنوان
document.getElementById("title").innerText = d.title;

// الهيرو
document.getElementById("hero_title").innerText = d.hero_title;
document.getElementById("hero_sub").innerText = d.hero_sub;

// الخدمات
let s = document.getElementById("services");
s.innerHTML = "";
d.services.forEach(x => {
let div = document.createElement("div");
div.className = "card";
div.innerText = x;
s.appendChild(div);
});

// الأسعار
let p = document.getElementById("prices");
p.innerHTML = "";
d.prices.forEach(x => {
let div = document.createElement("div");
div.className = "card";
div.innerText = x.name + " - " + x.price;
p.appendChild(div);
});

// المعرض (Grid + تكبير)
let g = document.getElementById("gallery");
g.innerHTML = "";

d.gallery.forEach(img => {
let i = document.createElement("img");
i.src = img;

i.onclick = function(){
document.getElementById("lightboxImg").src = img;
document.getElementById("lightbox").style.display = "flex";
};

g.appendChild(i);
});

// الروابط
document.getElementById("whatsapp").href = d.links.whatsapp;
document.getElementById("telegram").href = d.links.telegram;
document.getElementById("facebook").href = d.links.facebook;

// الفوتر
document.getElementById("footer").innerText = d.footer;

});
</script>

</body>
</html>

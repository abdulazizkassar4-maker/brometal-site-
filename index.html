<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brometal</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0d0d0d;
color:#fff;
}

/* NAV */
nav{
background:rgba(10,10,10,0.92);
backdrop-filter:blur(10px);
padding:14px;
text-align:center;
position:sticky;
top:0;
z-index:999;
border-bottom:1px solid #222;
}

nav a{
color:#ccc;
margin:10px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
color:#00c3ff;
}

/* HERO SLIDER */
.hero{
text-align:center;
padding:90px 20px;
background:#1a1a1a;
transition:1s;
}

.hero h1{
font-size:36px;
color:#00c3ff;
margin-bottom:10px;
}

.hero p{
color:#aaa;
}

.fade{
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0;transform:scale(1.05)}
to{opacity:1;transform:scale(1)}
}

/* SECTIONS */
.section{
padding:40px 20px;
text-align:center;
}

/* CARDS */
.card{
background:linear-gradient(145deg,#161616,#101010);
margin:12px auto;
padding:18px;
border-radius:14px;
max-width:520px;
border:1px solid #222;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:#00c3ff;
box-shadow:0 10px 25px rgba(0,195,255,0.08);
}

/* LINKS */
a{
color:#00c3ff;
text-decoration:none;
display:block;
margin:6px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#0f0f0f;
color:#666;
border-top:1px solid #222;
}

/* MOBILE */
@media(max-width:600px){
.hero h1{font-size:26px;}
.card{margin:10px;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<a href="index.html">الرئيسية</a>
<a href="about.html">من نحن</a>
<a href="gallery.html">المعرض</a>
</nav>

<!-- HERO -->
<div class="hero" id="slider">
<h1 id="hero_title"></h1>
<p id="hero_sub"></p>
</div>

<!-- SERVICES -->
<div class="section">
<h2>خدماتنا</h2>
<div id="services"></div>
</div>

<!-- PRICES -->
<div class="section">
<h2>الأسعار</h2>
<div id="prices"></div>
</div>

<!-- CONTACT -->
<div class="section">
<h2>تواصل معنا</h2>
<a id="whatsapp">واتساب</a>
<a id="telegram">تيليغرام</a>
<a id="facebook">فيسبوك</a>
</div>

<!-- FOOTER -->
<footer id="footer"></footer>

<script>
fetch("data.json")
.then(r => r.json())
.then(d => {

// TITLE
document.title = d.title;

// SLIDER
let slides = [
{
title: d.hero_title,
sub: d.hero_sub
},
{
title: "تصنيع معدني احترافي",
sub: "جودة عالية وحلول متكاملة"
},
{
title: "Brometal Engineering",
sub: "نحو صناعة احترافية"
}
];

let index = 0;

function showSlide(){
let hero = document.getElementById("slider");

hero.classList.remove("fade");
void hero.offsetWidth;
hero.classList.add("fade");

document.getElementById("hero_title").innerText = slides[index].title;
document.getElementById("hero_sub").innerText = slides[index].sub;

index++;
if(index >= slides.length) index = 0;
}

showSlide();
setInterval(showSlide, 4000);

// SERVICES
let s = document.getElementById("services");
s.innerHTML = "";
d.services.forEach(x=>{
let div = document.createElement("div");
div.className = "card";
div.innerText = x;
s.appendChild(div);
});

// PRICES
let p = document.getElementById("prices");
p.innerHTML = "";
d.prices.forEach(x=>{
let div = document.createElement("div");
div.className = "card";
div.innerText = x.name + " - " + x.price;
p.appendChild(div);
});

// LINKS
document.getElementById("whatsapp").href = d.links.whatsapp;
document.getElementById("telegram").href = d.links.telegram;
document.getElementById("facebook").href = d.links.facebook;

// FOOTER
document.getElementById("footer").innerText = d.footer;

});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brometal</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #000;
}

.logo {
    color: red;
    font-size: 24px;
    font-weight: bold;
}

.hero {
    background: url('https://images.unsplash.com/photo-1503387762-592deb58ef4e') center/cover;
    height: 60vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 30px;
}

.hero h1 {
    font-size: 40px;
}

.btn {
    background: red;
    padding: 10px 20px;
    border: none;
    color: white;
    cursor: pointer;
    width: fit-content;
}

.section {
    padding: 20px;
}

.cards {
    display: flex;
    overflow-x: auto;
    gap: 10px;
}

.card {
    min-width: 200px;
    height: 120px;
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
}

footer {
    text-align: center;
    padding: 20px;
    background: #000;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
    <div class="logo">Brometal</div>
    <div>تصنيع معدني</div>
</header>

<section class="hero">
    <h1>نصنع حضورك التجاري</h1>
    <p>لوحات - طباعة - تشكيل معدني</p>
    <button class="btn">تواصل معنا</button>
</section>

<section class="section">
    <h2>خدماتنا</h2>
    <div class="cards">
        <div class="card">لوحات</div>
        <div class="card">قص ليزر</div>
        <div class="card">ستانلس</div>
        <div class="card">طباعة</div>
    </div>
</section>

<section class="section">
    <h2>أعمالنا</h2>
    <div class="cards">
        <div class="card">مشروع 1</div>
        <div class="card">مشروع 2</div>
        <div class="card">مشروع 3</div>
    </div>
</section>

<footer>
    Brometal © 2026
</footer>

</body>
</html>
